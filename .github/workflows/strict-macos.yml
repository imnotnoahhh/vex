name: Strict macOS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      validate_published_release:
        description: Also validate the latest published release binary
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: strict-macos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  local-build:
    name: Strict Local Build (macOS 14)
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: strict-local-build-macos-14
      - name: Build local vex binary
        run: cargo build
      - name: Run strict local build validation
        env:
          VEX_TEST_HOME: /tmp/vex-audit-home
          VEX_STRICT_TMP_ROOT: ${{ runner.temp }}/strict-local-build
          VEX_STRICT_USE_LOCAL_BUILD: "1"
          VEX_STRICT_VEX_BIN: ${{ github.workspace }}/target/debug/vex
        run: python3 scripts/test_vex_release_strict.py
      - name: Run Rust extension live smoke against local build
        env:
          VEX_TEST_HOME: /tmp/vex-rust-live-home
          VEX_BIN: ${{ github.workspace }}/target/debug/vex
        run: bash scripts/test-rust-extensions-live.sh
      - name: Smoke export and repair commands against local build
        env:
          VEX_TEST_HOME: /tmp/vex-audit-home
          VEX_STRICT_VEX_BIN: ${{ github.workspace }}/target/debug/vex
        run: |
          HOME="$VEX_TEST_HOME" "$VEX_STRICT_VEX_BIN" env zsh --exports > "${{ runner.temp }}/strict-local-build/env-exports.txt"
          HOME="$VEX_TEST_HOME" "$VEX_STRICT_VEX_BIN" repair migrate-home
      - name: Upload strict local build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: strict-local-build-macos-14
          path: ${{ runner.temp }}/strict-local-build
          if-no-files-found: warn

  release-binary:
    name: Strict Release Binary (macOS 14)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.validate_published_release }}
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: strict-release-binary-macos-14
      - name: Run strict release validation
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VEX_TEST_HOME: /tmp/vex-release-audit-home
          VEX_STRICT_TMP_ROOT: ${{ runner.temp }}/strict-release-binary
        run: python3 scripts/test_vex_release_strict.py
      - name: Run Rust extension live smoke against release binary
        env:
          VEX_TEST_HOME: /tmp/vex-release-rust-live-home
          VEX_BIN: ${{ runner.temp }}/strict-release-binary/vex-release/vex
        run: |
          if [ ! -x "$VEX_BIN" ]; then
            echo "Could not locate extracted vex release binary for Rust extension smoke" >&2
            exit 1
          fi
          bash scripts/test-rust-extensions-live.sh
      - name: Upload strict release artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: strict-release-binary-macos-14
          path: ${{ runner.temp }}/strict-release-binary
          if-no-files-found: warn
